<div class="page-header">
    <h2>Référentiel : Vraisemblance</h2>
    <p>Définissez l'échelle de vraisemblance utilisée pour la cartographie des risques.</p>
</div>

<div class="table-square">
    <h3>Échelle de vraisemblance</h3>
    <table class="data-table" style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
        <thead>
            <tr style="background: var(--c-bg-panel); border-bottom: 2px solid var(--c-border); text-align: left;">
                <th style="padding: 10px; width: 60px;">Val.</th>
                <th style="padding: 10px; width: 150px;">Niveau</th>
                <th style="padding: 10px; width: 80px;">Coul.</th>
                <th style="padding: 10px;">Description</th>
                <th style="padding: 10px; width: 40px;"></th>
            </tr>
        </thead>
        <tbody id="ref-vraisemblance-tbody">
            <!-- Injecté par JS -->
        </tbody>
    </table>
    <button class="btn secondary" id="btn-add-vraisemblance">+ Ajouter un niveau</button>
</div>

<div class="table-square">
    <h3>Échelle de la Kill-chain</h3>
    <table class="data-table" style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
        <thead>
            <tr style="background: var(--c-bg-panel); border-bottom: 2px solid var(--c-border); text-align: left;">
                <th style="padding: 10px; width: 60px;">Val.</th>
                <th style="padding: 10px;">Phase de la Kill-chain</th>
                <th style="padding: 10px; width: 40px;"></th>
            </tr>
        </thead>
        <tbody id="ref-killchain-tbody">
            <!-- Injecté par JS -->
        </tbody>
    </table>
    <button class="btn secondary" id="btn-add-killchain">+ Ajouter une phase</button>
</div>
