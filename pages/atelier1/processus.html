<div class="page-header">
    <h2>Atelier 1 : Processus métier</h2>
    <p>Définissez les processus de votre organisation.</p>
</div>

<div style="margin-bottom: 20px;">
    <button class="btn primary" id="btn-add-processus">+ Ajouter un processus métier</button>
</div>

<div id="processus-container">
    <!-- Les cartes processus seront injectées ici -->
</div>

<!-- Template d'une carte processus (caché) -->
<template id="tpl-processus">
    <div class="card-square processus-card" data-id="">
        <h3>Processus <span class="ref-display"></span></h3>
        
        <label>Référence</label>
        <input type="text" class="proc-ref" disabled>
        
        <label>Nom du processus</label>
        <input type="text" class="proc-nom" placeholder="Ex: Gestion des RH">
        
        <label>Description de l'activité</label>
        <textarea class="proc-desc" rows="3" placeholder="Description de l'activité du processus..."></textarea>
        
        <div style="text-align: right; margin-top: 10px;">
            <button class="btn secondary btn-del-processus">Supprimer</button>
        </div>
    </div>
</template>
