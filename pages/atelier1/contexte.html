<div class="page-header">
    <h2>Atelier 1 : Contexte de l'analyse</h2>
    <p>Définissez l'organisation, ses activités et le périmètre de l'étude.</p>
</div>

<div class="card-square">
    <h3>Information générale</h3>
    
    <label for="ctx-organisation">Organisation</label>
    <input type="text" id="ctx-organisation" placeholder="Nom de l'organisation">
    
    <label for="ctx-site">Site internet</label>
    <div style="display:flex; gap:10px;">
        <input type="text" id="ctx-site" placeholder="https://www.google.fr">
        <button class="btn secondary" id="btn-open-site" style="height: 35px;">Ouvrir</button>
    </div>
    
    <label for="ctx-secteur">Secteur d'activité</label>
    <input type="text" id="ctx-secteur" placeholder="Secteur...">

    <label for="ctx-activite">Activité</label>
    <textarea id="ctx-activite" rows="3" placeholder="Description de l'activité principale..."></textarea>
    
    <label for="ctx-perimetre">Périmètre de l'analyse</label>
    <textarea id="ctx-perimetre" rows="3" placeholder="Description du périmètre étudié..."></textarea>
</div>
