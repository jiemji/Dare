<div class="page-header">
    <h2>Atelier 2 : Sources de risque</h2>
    <p>Identifiez les acteurs qui pourraient porter atteinte à votre organisation.</p>
</div>

<div id="sr-container">
    <!-- Les cartes sources de risques seront injectées ici -->
</div>

<div style="margin-top: 20px;">
    <button class="btn primary" id="btn-add-sr">+ Ajouter une source de risque</button>
</div>

<!-- Template d'une carte source de risque -->
<template id="tpl-sr-card">
    <div class="card-square sr-card" data-sr-id="">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h4>Source de risque <span class="sr-ref-display"></span></h4>
            <button class="btn secondary btn-del-sr" style="padding: 4px 8px;">✕</button>
        </div>
        
        <label>Libellé</label>
        <input type="text" class="sr-libelle" placeholder="Ex: Groupe cybercriminel">
        
        <label>Description</label>
        <textarea class="sr-desc" rows="2" placeholder="Description de la source de risque..."></textarea>
        
        <label>Ressources</label>
        <select class="sr-ressources">
            <!-- Options injectées par JS -->
        </select>
    </div>
</template>
