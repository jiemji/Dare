<div class="page-header">
    <h2>Atelier 5 : Plan de traitement du risque</h2>
    <p>Définissez les mesures de sécurité pour traiter les risques identifiés.</p>
</div>

<div class="treatment-section" data-type="gouvernance">
    <h3>Gouvernance</h3>
    <div class="cards-container" id="container-gouvernance"></div>
    <button class="btn secondary btn-add-measure" data-type="gouvernance">+ Ajouter une mesure de gouvernance</button>
</div>

<div class="treatment-section" data-type="protection">
    <h3>Protection</h3>
    <div class="cards-container" id="container-protection"></div>
    <button class="btn secondary btn-add-measure" data-type="protection">+ Ajouter une mesure de protection</button>
</div>

<div class="treatment-section" data-type="detection">
    <h3>Détection</h3>
    <div class="cards-container" id="container-detection"></div>
    <button class="btn secondary btn-add-measure" data-type="detection">+ Ajouter une mesure de détection</button>
</div>

<div class="treatment-section" data-type="reaction">
    <h3>Réaction</h3>
    <div class="cards-container" id="container-reaction"></div>
    <button class="btn secondary btn-add-measure" data-type="reaction">+ Ajouter une mesure de réaction</button>
</div>

<div class="treatment-section" data-type="resilience">
    <h3>Résilience</h3>
    <div class="cards-container" id="container-resilience"></div>
    <button class="btn secondary btn-add-measure" data-type="resilience">+ Ajouter une mesure de résilience</button>
</div>

<!-- Template de mesure de sécurité -->
<template id="tpl-measure-card">
    <div class="card-long measure-card" data-measure-id="">
        <div style="min-width: 80px; flex: 0 0 80px;">
            <label>Réf.</label>
            <div class="measure-ref" style="font-weight: bold; padding: 8px 0;"></div>
        </div>
        
        <div style="flex: 2; min-width: 300px;">
            <label>Descriptif de la mesure</label>
            <textarea class="measure-desc" rows="1" placeholder="Ex: Mise en place d'une politique de mot de passe..."></textarea>
        </div>

        <div style="flex: 1; min-width: 200px;">
            <label>Cibles</label>
            <input type="text" class="measure-cibles" placeholder="Ex: Serveurs Active Directory">
        </div>

        <div style="width: 100px; flex: 0 0 100px;">
            <label>Priorité</label>
            <select class="measure-priority">
                <option value="P0">P0</option>
                <option value="P1">P1</option>
                <option value="P2">P2</option>
                <option value="P3">P3</option>
            </select>
        </div>

        <div style="width: 40px; flex: 0 0 40px; display: flex; align-items: flex-end; padding-bottom: 12px;">
            <button class="btn secondary btn-del-measure" title="Supprimer" style="padding: 4px 8px;">✕</button>
        </div>
    </div>
</template>

<style>
    .treatment-section {
        width: 100%;
        margin-bottom: 30px;
        border-bottom: 1px solid var(--c-border);
        padding-bottom: 20px;
    }
    .treatment-section h3 {
        margin-bottom: 15px;
        color: var(--c-accent);
        text-transform: uppercase;
        font-size: 1.1em;
        letter-spacing: 1px;
    }
    .measure-card {
        margin-bottom: 10px;
    }
    .btn-add-measure {
        margin-top: 10px;
    }
</style>
