<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dare - Analyse des Risques</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="mermaid-editor/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Bandeau horizontal -->
        <header class="navbar">
            <h1 class="nav-logo">DARE</h1>
            <div class="spacer"></div>
            <button id="btn-save" class="nav-btn attr-icon" title="Sauvegarder">💾</button>
            <button id="btn-theme" class="nav-btn attr-icon" title="Changer de thème">🌓</button>
        </header>

        <!-- Bande latérale -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3>Navigation</h3>
            </div>
            <div class="sidebar-content">
                <ul id="sidebar-menu" class="sidebar-menu">
                    <!-- Les items de menu seront générés dynamiquement ici -->
                </ul>
            </div>
            <div class="sidebar-footer">
                <button id="btn-file-menu" class="btn-file">
                    <span class="icon">📁</span> [ Fichier ]
                </button>
            </div>
        </aside>

        <!-- Contenu principal chargé dynamiquement -->
        <main id="main-content" class="main-content">
            <div class="welcome-screen">
                <h1>Bienvenue dans Dare</h1>
                <p>Application d'analyse des risques (EBIOS RM / ISO 27005).</p>
            </div>
        </main>
    </div>

    <!-- Modale de menu de base (burger) -->
    <div id="burger-menu" class="modal hidden">
        <div class="modal-content">
            <h2>Menu Principal</h2>
            <button class="btn" id="menu-new">Nouvelle analyse</button>
            <button class="btn" id="menu-load">Charger...</button>
            <button class="btn" id="menu-save">Sauvegarder</button>
            <button class="btn secondary" id="menu-help">Aide</button>
            <button class="btn-close" id="close-burger">Fermer</button>
        </div>
    </div>

    <!-- Modale pour l'éditeur Mermaid -->
    <div id="node-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Propriétés du nœud</h3>
            <div class="form-group">
                <label for="modal-text">Texte :</label>
                <input type="text" id="modal-text" placeholder="Entrez le texte...">
            </div>
            <div class="form-group">
                <label>Valeur (1-4) :</label>
                <div class="value-selector">
                    <label class="val-opt"><input type="radio" name="node-value" value="1"> <span class="dot val-1"></span> 1</label>
                    <label class="val-opt"><input type="radio" name="node-value" value="2"> <span class="dot val-2"></span> 2</label>
                    <label class="val-opt"><input type="radio" name="node-value" value="3"> <span class="dot val-3"></span> 3</label>
                    <label class="val-opt"><input type="radio" name="node-value" value="4"> <span class="dot val-4"></span> 4</label>
                </div>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-secondary">Annuler</button>
                <button id="modal-save" class="btn btn-primary">Enregistrer</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
